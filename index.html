<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Tour</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --card: #141417;
      --accent: #e8ff47;
      --text: #f0f0ec;
      --muted: #666;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }

    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    header span {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px;
      gap: 20px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .scene-label {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .scene-label h2 {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .scene-label p {
      font-size: 13px;
      color: var(--muted);
    }

    #panorama {
      width: 100%;
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .pnlm-load-box,
    .pnlm-lbar,
    .pnlm-lbar-fill,
    .pnlm-loading,
    .pnlm-load-button { display: none !important; }

    .scene-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .scene-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .scene-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .scene-btn.active {
      background: var(--accent);
      color: #0d0d0f;
      border-color: var(--accent);
      font-weight: 700;
    }

    .info-bar {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .hs-num {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: rgba(0,0,0,0.75);
      border: 2px solid white;
      background-image: none !important;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hs-0::after { content: "G"; color: white; font-size: 18px; font-weight: bold; }
    .hs-1::after { content: "1"; color: white; font-size: 18px; font-weight: bold; }
    .hs-2::after { content: "2"; color: white; font-size: 18px; font-weight: bold; }
    .hs-3::after { content: "3"; color: white; font-size: 18px; font-weight: bold; }
    .hs-4::after { content: "4"; color: white; font-size: 18px; font-weight: bold; }
    .hs-5::after { content: "5"; color: white; font-size: 18px; font-weight: bold; }
    .hs-6::after { content: "6"; color: white; font-size: 18px; font-weight: bold; }

    footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-align: center;
    }
  </style>
</head>

  pannellumScenes[key] = {
    type: "equirectangular",
    hfov: 120,
    ...scenes[key]
  };
  }

  let viewer = pannellum.viewer('panorama', {
  default: {
    firstScene: "scene1",
    sceneFadeDuration: 800,
    autoLoad: true,
    showZoomCtrl: true,
    showFullscreenCtrl: true
  },
  scenes: pannellumScenes
  });

  Object.values(scenes).forEach(s => { new Image().src = s.panorama; });

  viewer.on('scenechange', function(id) {
    document.querySelectorAll('.scene-btn').forEach((b, i) => {
      b.classList.toggle('active', Object.keys(scenes)[i] === id);
    });
    document.getElementById('current-title').textContent = scenes[id].title;
    document.getElementById('current-desc').textContent  = scenes[id].desc;
  });

  function switchScene(id, btn) {
    viewer.loadScene(id);
    document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('current-title').textContent = scenes[id].title;
    document.getElementById('current-desc').textContent  = scenes[id].desc;
  }
