<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>360° Virtual Tour</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --card: #141417;
      --accent: #e8ff47;
      --text: #f0f0ec;
      --muted: #666;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }

    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    header span {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px;
      gap: 20px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .scene-label {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .scene-label h2 {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .scene-label p {
      font-size: 13px;
      color: var(--muted);
    }

    #panorama {
      width: 100%;
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .pnlm-load-box,
    .pnlm-lbar,
    .pnlm-lbar-fill,
    .pnlm-loading,
    .pnlm-load-button { display: none !important; }

    .scene-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .scene-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .scene-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .scene-btn.active {
      background: var(--accent);
      color: #0d0d0f;
      border-color: var(--accent);
      font-weight: 700;
    }

    .info-bar {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>360° Virtual Tour</h1>
  <span>3 Scenes</span>
</header>

<main>

  <div class="scene-label">
    <h2 id="current-title">Chawl — 1</h2>
    <p id="current-desc">Drag to look around · Scroll to zoom · Click arrows to move</p>
  </div>

  <div id="panorama"></div>

  <div class="scene-nav">
    <button class="scene-btn active" onclick="switchScene('scene1', this)">Chawl — 1</button>
    <button class="scene-btn" onclick="switchScene('scene2', this)">Chawl — 2</button>
    <button class="scene-btn" onclick="switchScene('scene3', this)">Chawl — 3</button>
  </div>

  <div class="info-bar">
    <span>Drag to look around</span>
    <span>Scroll to zoom</span>
    <span>Click hotspots to navigate</span>
  </div>

</main>

<footer>360° Virtual Tour &nbsp;·&nbsp; Pannellum</footer>

<script>
  const scenes = {
    scene1: {
      title: "Chawl — 1",
      desc:  "Drag to look around · Scroll to zoom · Click arrows to move",
      panorama: "panoramas/chawl-1.jpg",
      hotSpots: [
        { pitch: -22, yaw: 0,   type: "scene", text: "→ Chawl 2", sceneId: "scene2" }
      ]
    },
    scene2: {
      title: "Chawl — 2",
      desc:  "Drag to look around · Scroll to zoom · Click arrows to move",
      panorama: "panoramas/chawl-2.jpg",
      hotSpots: [
        { pitch: -20, yaw: 180, type: "scene", text: "← Chawl 1", sceneId: "scene1" },
        { pitch: -22, yaw: 0,   type: "scene", text: "→ Chawl 3", sceneId: "scene3" }
      ]
    },
    scene3: {
      title: "Chawl — 3",
      desc:  "Drag to look around · Scroll to zoom · Click arrows to move",
      panorama: "panoramas/chawl-3.jpg",
      hotSpots: [
        { pitch: -5, yaw: 200, type: "scene", text: "← Chawl 2", sceneId: "scene2" }
      ]
    }
  };

  let viewer = pannellum.viewer('panorama', {
    default: {
      firstScene:         "scene1",
      sceneFadeDuration:  800,
      autoLoad:           true,
      showZoomCtrl:       true,
      showFullscreenCtrl: true,
      hotSpotDebug:       false
    },
    scenes: {
      scene1: { type: "equirectangular", hfov: 110, ...scenes.scene1 },
      scene2: { type: "equirectangular", hfov: 110, ...scenes.scene2 },
      scene3: { type: "equirectangular", hfov: 110, ...scenes.scene3 }
    }
  });

  Object.values(scenes).forEach(s => { new Image().src = s.panorama; });

  viewer.on('scenechange', function(id) {
    document.querySelectorAll('.scene-btn').forEach((b, i) => {
      b.classList.toggle('active', Object.keys(scenes)[i] === id);
    });
    document.getElementById('current-title').textContent = scenes[id].title;
    document.getElementById('current-desc').textContent  = scenes[id].desc;
  });

  function switchScene(id, btn) {
    viewer.loadScene(id);
    document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('current-title').textContent = scenes[id].title;
    document.getElementById('current-desc').textContent  = scenes[id].desc;
  }
</script>

</body>
</html>
